<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA-ACMULLER</title>
<style>
body{font-family:system-ui,sans-serif;background:#0f172a;color:#fff;text-align:center;padding:40px 20px;margin:0}
.logo{font-size:5rem;margin-bottom:10px}
h1{background:linear-gradient(90deg,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:2.5rem;margin-bottom:20px}
p{color:#94a3b8;margin-bottom:30px;line-height:1.6;max-width:500px;margin-left:auto;margin-right:auto}
.btn{display:block;width:90%;max-width:300px;margin:15px auto;padding:18px;background:#22c55e;color:#fff;text-decoration:none;border-radius:12px;font-weight:bold;font-size:1.1rem;transition:transform 0.2s}
.btn:hover{transform:scale(1.05)}
.btn2{background:#6366f1}
.features{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;margin:40px 0;max-width:600px;margin-left:auto;margin-right:auto}
.feature{background:#1e293b;padding:15px 20px;border-radius:10px;font-size:1.5rem;transition:transform 0.2s}
.feature:hover{transform:translateY(-5px)}
.feature-label{display:block;font-size:0.75rem;color:#94a3b8;margin-top:5px}
footer{margin-top:50px;color:#64748b;font-size:0.9rem}
</style>
</head>
<body>
<div class="logo">🤖</div>
<h1>IA-ACMULLER</h1>
<p>Inteligência Artificial 100% gratuita para Android.<br>Chat, código, voz, vídeo, agente autônomo e mais.</p>
<a href="#" class="btn" onclick="alert('curl -fsSL ia-acmuller.github.io/install.sh | bash')">📱 Instalar no Termux</a>
<a href="#" class="btn btn2" onclick="alert('APK em desenvolvimento!')">⚡ Baixar APK</a>
<div class="features">
<div class="feature">💬<span class="feature-label">Chat</span></div>
<div class="feature">💻<span class="feature-label">Código</span></div>
<div class="feature">🎙️<span class="feature-label">Voz</span></div>
<div class="feature">📹<span class="feature-label">Vídeo</span></div>
<div class="feature">🤖<span class="feature-label">Agente</span></div>
<div class="feature">📱<span class="feature-label">WhatsApp</span></div>
</div>
<footer>© 2026 IA-ACMULLER • Open Source • Feito com 💜</footer>
</body>
</html>
