<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA-ACMULLER</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: system-ui, sans-serif;
  background: #0f172a;
  color: #fff;
  text-align: center;
  padding: 40px 20px;
}

.logo { font-size: 5rem; margin-bottom: 10px; }

h1 {
  background: linear-gradient(90deg, #6366f1, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-size: 2.5rem;
  margin-bottom: 20px;
}

p { color: #94a3b8; margin-bottom: 30px; }

.btn {
  display: block;
  width: 90%;
  max-width: 300px;
  margin: 15px auto;
  padding: 18px;
  background: #22c55e;
  color: #fff;
  text-decoration: none;
  border-radius: 12px;
  font-weight: bold;
  font-size: 1.1rem;
  border: none;
  cursor: pointer;
}

.btn2 { background: #6366f1; }

.features {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  margin: 40px 0;
}

.feature { background: #1e293b; padding: 15px 20px; border-radius: 10px; font-size: 1.5rem; }

footer { margin-top: 50px; color: #64748b; font-size: 0.9rem; }

#install-btn {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #22c55e;
  color: white;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: bold;
  border: none;
  z-index: 1000;
}
</style>
</head>

<body>
<div class="logo">🤖</div>
<h1>IA-ACMULLER</h1>
<p>Inteligência Artificial 100% gratuita para Android.<br>Chat, código, voz, vídeo, agente autônomo e mais.</p>

<a href="#" class="btn" onclick="copiar()">📱 Instalar no Termux</a>
<a href="https://f-droid.org/packages/com.termux/" class="btn btn2">📲 Baixar Termux</a>

<div class="features">
<div class="feature">💬<br><small>Chat</small></div>
<div class="feature">💻<br><small>Código</small></div>
<div class="feature">🎙️<br><small>Voz</small></div>
<div class="feature">📹<br><small>Vídeo</small></div>
<div class="feature">🤖<br><small>Agente</small></div>
<div class="feature">📱<br><small>WhatsApp</small></div>
</div>

<footer>© 2026 IA-ACMULLER • Open Source • 💜</footer>

<button id="install-btn" onclick="instalar()">📲 Instalar App</button>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-btn').style.display = 'block';
});

function instalar() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      document.getElementById('install-btn').style.display = 'none';
      deferredPrompt = null;
    });
  } else {
    alert('📱 Android: Menu → "Adicionar à tela inicial"\niPhone: Compartilhar → "Adicionar à Tela de Início"');
  }
}

function copiar() {
  const cmd = 'curl -fsSL https://acmuller79.github.io/install.sh | bash';
  navigator.clipboard.writeText(cmd).then(() => {
    alert('✅ Comando copiado! Abra o Termux e cole.');
  });
}
</script>
</body>
</html>
